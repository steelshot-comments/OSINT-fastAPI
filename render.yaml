services:
  - type: web
    name: fastapi-demo
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker app.main:app"
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASS
        sync: false
      - key: REDIS_URL
        sync: false

  - type: worker
    name: fastapi-worker
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A app.core.celery_app.celery_app worker --loglevel=info"
    envVars:
      - fromService:
          type: web
          name: fastapi-demo
